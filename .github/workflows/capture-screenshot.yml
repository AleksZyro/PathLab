name: Capture PathLab screenshot

on:
  push:
    branches:
      - chore/pathlab-portfolio
    paths-ignore:
      - docs/screenshots/pathlab-overview.png

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build application
        run: npm run build -- --base=/PathLab/
      - name: Start static server
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/pathlab-server.log 2>&1 &
          sleep 3
      - name: Capture screenshot
        run: |
          BROWSER="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -n "$BROWSER"
          mkdir -p docs/screenshots
          "$BROWSER" --headless=new --disable-gpu --no-sandbox --hide-scrollbars --window-size=1440,1100 --virtual-time-budget=3000 --screenshot=docs/screenshots/pathlab-overview.png http://127.0.0.1:4173/PathLab/
          test -s docs/screenshots/pathlab-overview.png
      - name: Commit screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/pathlab-overview.png
          git diff --cached --quiet || git commit -m "docs: add PathLab overview screenshot"
          git push
